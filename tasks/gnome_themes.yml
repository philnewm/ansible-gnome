---

- name: Get installed gnome themes
  ansible.builtin.find:
    paths: "{{ theme_paths }}"
    file_type: directory
    depth: 1
  register: theme_dirs

- name: Set themes list
  ansible.builtin.set_fact:
    themes: "{{ theme_dirs.files | map(attribute='path') | map('basename') | list }}"

- name: Install themes
  loop: "{{ gnome_themes }}"
  loop_control:
    label: "{{ theme.name }}"
    loop_var: theme
  when: theme.name not in themes
  ansible.builtin.include_tasks:
    file: install_themes.yml

- name: Combine gnome theme dconf settings
  ansible.builtin.set_fact:
    gnome_theme_dconf_settings: >-
      {{
        gnome_themes
        | selectattr('dconf_settings', 'defined')
        | map(attribute='dconf_settings')
        | list
        | ansible.builtin.combine
      }}

- name: Install system-wide gnome-theme dconf defaults
  become: true
  ansible.builtin.template:
    src: gnome-themes.j2
    dest: "{{ gnome_systemwide_themes_default_dconf }}"
    owner: root
    group: root
    mode: "0644"
  notify: Update dconf

...
