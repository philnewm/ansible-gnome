---

- name: Ensure locals on debian based systems
  when: ansible_facts.os_family | lower == "debian"
  block:
    - name: Ensure locales package is installed
      become: true
      ansible.builtin.package:
        name: locales
        state: present

    - name: Enable en_US.UTF-8 locale
      become: true
      ansible.builtin.lineinfile:
        path: /etc/locale.gen
        regexp: '^#?\s*en_US\.UTF-8 UTF-8'
        line: 'en_US.UTF-8 UTF-8'

    - name: Generate locales
      become: true
      ansible.builtin.command:
        cmd: locale-gen
      changed_when: false

    - name: Set system locale
      become: true
      ansible.builtin.copy:
        dest: /etc/default/locale
        content: |
          LANG=en_US.UTF-8
          LC_ALL=en_US.UTF-8
        owner: root
        group: root
        mode: "0644"

- name: Ensure locals on redhat based systems
  when: ansible_facts.os_family | lower == "redhat"
  block:
    - name: Ensure local on redhat based systems
      become: true
      ansible.builtin.dnf:
        name: glibc-langpack-en
        state: present

    - name: Set system locale
      become: true
      ansible.builtin.copy:
        dest: /etc/locale.conf
        content: |
          LANG=en_US.UTF-8
          LC_ALL=en_US.UTF-8
        owner: root
        group: root
        mode: "0644"

- name: Adjust almalinux home mapper for disk analyzer usage
  when: ansible_facts.distribution | lower == "almalinux"
  ansible.builtin.include_tasks:
    file: almalinux_home_mapper.yml

- name: Create system default resolution path
  become: true
  ansible.builtin.file:
    path: "{{ gdm_monitor_config_sys_path[ansible_facts.os_family | lower] }}"
    state: directory
    mode: "0700"
    owner: "{{ gdm_user_name[ansible_facts.distribution | lower] }}"
    group: "{{ gdm_user_name[ansible_facts.distribution | lower] }}"

- name: Set system default resolution
  become: true
  ansible.builtin.template:
    src: monitors.xml.j2
    dest: "{{ gdm_monitor_config_sys_path[ansible_facts.os_family | lower] }}/monitors.xml"
    mode: "0644"
    owner: "{{ gdm_user_name[ansible_facts.distribution | lower] }}"
    group: "{{ gdm_user_name[ansible_facts.distribution | lower] }}"

- name: Ensure config directory exists
  become: true
  ansible.builtin.file:
    path: "{{ gnome_system_wide_dconf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

...
