---

- name: Get installed gnome themes
  ansible.builtin.find:
    paths: "{{ theme_paths }}"
    file_type: directory
    depth: 1
  register: theme_dirs

- name: Build removable theme list
  ansible.builtin.set_fact:
    removable_themes: >-
      {{ theme_dirs.files
        | rejectattr('path', 'search', '/hicolor$')
        | map(attribute='path')
        | list }}

- name: Remove themes except hicolor
  become: true
  when: removable_themes | length > 0
  ansible.builtin.command:
    cmd: >
      rm -rf {{ removable_themes | join(' ') }}
  changed_when: removable_themes | length > 0

- name: Remove manual installed extensions
  become: true
  ansible.builtin.file:
    path: "{{ extension_path_system }}"
    state: absent

- name: Remove system-wide default settings
  become: true
  ansible.builtin.file:
    path: "/etc/dconf/db/local.d/"
    state: absent

- name: Set default target to multi-user
  become: true
  ansible.builtin.file:
    src: /usr/lib/systemd/system/multi-user.target
    dest: /etc/systemd/system/default.target
    state: link
  notify: Reboot Host

- name: Remove gnome packages dnf5
  become: true
  when: ansible_facts.distribution | lower == "fedora"
  ansible.builtin.dnf:
    name:
      - gnome-shell
      - gdm
      - gnome-session-wayland-session
    state: absent
    autoremove: true

- name: Remove gnome packages
  become: true
  when: ansible_facts.distribution | lower != "fedora"
  ansible.builtin.package:
    name: "{{ gnome_packages[ansible_facts.distribution | lower] | flatten(1) }}"
    state: absent

- name: Clear flatpak content
  when: "'flatpak' in ansible_facts.packages"
  block:
    - name: Remove Flatpaks
      community.general.flatpak:
        name: "*"
        state: absent

    - name: Remove flathub flatpak repository remote
      become: true
      community.general.flatpak_remote:
        name: flathub
        state: absent

    - name: Remove flatpak packages dnf5
      become: true
      when: ansible_facts.distribution | lower == "fedora"
      ansible.builtin.dnf:
        name:
          - gnome-software
          - flatpak
        state: absent
        autoremove: true


    - name: Remove Flatpak
      become: true
      ansible.builtin.package:
        name: flatpak
        state: absent

...
